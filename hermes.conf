#!/bin/bash
# hermes.conf — Hermes-WRT configuration
# Override any value by setting env var before running imagebuilder.sh
# Example: KERNEL_SOURCE=armarchindo DISK_SIZE=4G ./imagebuilder.sh openwrt:24.10.0 s905x3 full
# ============================================================

# ── Build variant & size ──
# "full"   → all packages + tunnels + modem
# "simple" → essential + main tunnels
# "minimal"→ bare minimum (luci + basic)
BUILD_VARIANT="${BUILD_VARIANT:-full}"

# Total disk image size (for TV box path)
# Minimal 512M, rekomendasi 1G-4G tergantung packages
DISK_SIZE="${DISK_SIZE:-1G}"

# ── Kernel source (TV box path) ──
# "ophub"         → github.com/ophub/kernel (default, terlengkap)
# "armarchindo"   → github.com/armarchindo/kernel
# "sib0ndt"       → github.com/sib0ndt/linux (custom Amlogic kernel)
# "custom"        → KERNEL_URL must point to a release tarball
# "local"         → KERNEL_DIR must point to kernel files
KERNEL_SOURCE="${KERNEL_SOURCE:-ophub}"

# Custom kernel URL (used when KERNEL_SOURCE=custom)
KERNEL_URL="${KERNEL_URL:-}"

# Local kernel directory (used when KERNEL_SOURCE=local)
KERNEL_DIR="${KERNEL_DIR:-}"

# Kernel version (auto = latest stable from selected source)
# Examples: "6.12.0", "6.6.y", "kernel-amlogic-7.0.0", "auto"
KERNEL_VERSION="${KERNEL_VERSION:-auto}"

# ── Packer backend (TV box only) ──
# "hibrid"  → fallocate + parted + losetup (default, gak perlu external tool)
# "remake"  → ophub remake tool (legacy)
PACKER="${PACKER:-hibrid}"

# ── ImageBuilder mirror ──
# Default: openwrt.org / immortalwrt.org (auto-detect from source name)
IMAGEBUILDER_MIRROR="${IMAGEBUILDER_MIRROR:-}"

# ── Feature toggles ──
ENABLE_KIDDIN9_FEED="${ENABLE_KIDDIN9_FEED:-false}"
# Tipe Tunnel VPN yang ingin diinstal ("all", "openclash", "nikki", "mihombreng", "passwall", "openclash-nikki", "openclash-mihombreng", "none")
TUNNEL_TYPE="${TUNNEL_TYPE:-all}"
ENABLE_MODEM="${ENABLE_MODEM:-true}"
ENABLE_DOCKER="${ENABLE_DOCKER:-false}"
ENABLE_PYTHON="${ENABLE_PYTHON:-false}"
ENABLE_ADGUARD="${ENABLE_ADGUARD:-false}"
ENABLE_EXTRAS="${ENABLE_EXTRAS:-true}"

# ── Hermes custom tools ──
ENABLE_HERMES_CLI="${ENABLE_HERMES_CLI:-true}"
ENABLE_TELEGRAM_BOT="${ENABLE_TELEGRAM_BOT:-false}"
TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN:-}"
TELEGRAM_CHAT_ID="${TELEGRAM_CHAT_ID:-}"

# ── Output path ──
OUT_FIRMWARE="${OUT_FIRMWARE:-./out}"
