#!/bin/bash
# hermes.conf — Hermes-WRT default configuration
# Override any value by setting env var before running imagebuilder.sh
# Example: KERNEL_SOURCE=armarchindo ./imagebuilder.sh openwrt:24.10.0 s905x3 full
# ============================================================

# ── Kernel source for TV box / non-official devices ──
# "ophub"          → github.com/ophub/kernel (default, most complete)
# "armarchindo"    → github.com/armarchindo/kernel (alternative)
# "custom"         → KERNEL_URL must point to a custom repo
# "stable"         → mainline from kernel.org (same as ophub uses)
# "local"          → KERNEL_DIR must point to local kernel files
KERNEL_SOURCE="${KERNEL_SOURCE:-ophub}"

# Custom kernel URL (used when KERNEL_SOURCE=custom)
KERNEL_URL="${KERNEL_URL:-}"

# Local kernel directory (used when KERNEL_SOURCE=local)
KERNEL_DIR="${KERNEL_DIR:-}"

# Kernel version to use (auto = latest stable from source)
# Examples: "6.12.y", "6.18.y", "6.6.y", or "auto"
KERNEL_VERSION="${KERNEL_VERSION:-auto}"

# ── TV box U-Boot source ──
# "ophub" → github.com/ophub/amlogic-s9xxx-armbian (default)
UBOOT_SOURCE="${UBOOT_SOURCE:-ophub}"

# ── Packer backend (TV box only) ──
# "remake"  → ophub remake tool (default, most stable)
# "ulo"     → ULO-Builder approach (alternative)
PACKER="${PACKER:-remake}"

# ── ImageBuilder source ──
# Default: openwrt.org / immortalwrt.org
# Leave empty to use the source:version passed as argument
IMAGEBUILDER_MIRROR="${IMAGEBUILDER_MIRROR:-}"

# ── Build variant ──
# "full"   → all packages + docker + all tunnels
# "simple" → essential + OpenClash + Mihomo
# "minimal"→ bare minimum (luci + basic tools)
BUILD_VARIANT="${BUILD_VARIANT:-full}"

# ── Feature toggles ──
# Set to "false" to exclude a feature category
ENABLE_TUNNELS="${ENABLE_TUNNELS:-true}"
ENABLE_MODEM="${ENABLE_MODEM:-true}"
ENABLE_DOCKER="${ENABLE_DOCKER:-false}"
ENABLE_PYTHON="${ENABLE_PYTHON:-false}"
ENABLE_ADGUARD="${ENABLE_ADGUARD:-false}"
ENABLE_EXTRAS="${ENABLE_EXTRAS:-true}"    # extra apps: btop, fastfetch, screen, adb, etc.

# ── Output ──
OUT_FIRMWARE="${OUT_FIRMWARE:-./out}"
