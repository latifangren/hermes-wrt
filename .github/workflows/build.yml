name: Build Hermes-WRT

on:
  workflow_dispatch:
    inputs:
      source_name:
        description: 'Tipe Source (OpenWrt / ImmortalWrt)'
        required: true
        default: 'openwrt'
        type: choice
        options:
          - openwrt
          - immortalwrt
      source_version:
        description: 'Versi (misal: latest, 24.10.0, 23.05.5)'
        required: true
        default: 'latest'
        type: string
      device:
        description: 'Device'
        required: true
        default: 's905x'
        type: choice
        options:
          - s905x
          - s905x2
          - s905x3
          - s905x4
          - s912
          - h5-orangepi-zeroplus2
          - h6-orangepi-3
          - h616-orangepi-zero2
          - h618-orangepi-zero3
          - rk3566-orangepi-3b
          - rk3588s-orangepi-5
          - rk3588-orangepi-5plus
          - bcm2710-rpi-3b
          - bcm2711-rpi-4b
          - x86-64
      variant:
        description: 'Firmware variant'
        required: true
        default: 'simple'
        type: choice
        options:
          - full
          - simple
          - minimal
      kernel_source:
        description: 'Kernel source (TV box path)'
        required: true
        default: 'ophub'
        type: choice
        options:
          - ophub
          - armarchindo
          - sib0ndt
          - custom
      kernel_version:
        description: 'Kernel version (auto = latest stable)'
        required: true
        default: 'auto'
      disk_size:
        description: 'Total disk image size'
        required: true
        default: '1G'
        type: choice
        options:
          - 512M
          - 1G
          - 2G
          - 4G
          - 8G
      enable_tunnels:
        description: 'Include tunnel packages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_modem:
        description: 'Include modem packages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Install Deps
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk \
            git gettext libssl-dev rsync wget unzip tar gzip qemu-utils jq \
            python3 python3-pip aria2 parted dosfstools
          sudo timedatectl set-timezone "$TZ"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Config
        run: |
          cat >> hermes.conf << EOF
          KERNEL_SOURCE=${{ inputs.kernel_source }}
          KERNEL_VERSION=${{ inputs.kernel_version }}
          BUILD_VARIANT=${{ inputs.variant }}
          DISK_SIZE=${{ inputs.disk_size }}
          ENABLE_TUNNELS=${{ inputs.enable_tunnels }}
          ENABLE_MODEM=${{ inputs.enable_modem }}
          ENABLE_KIDDIN9_FEED=false
          EOF

      - name: Build
        id: build
        run: |
          chmod +x imagebuilder.sh
          if sudo ./imagebuilder.sh "${{ inputs.source_name }}:${{ inputs.source_version }}" "${{ inputs.device }}" "${{ inputs.variant }}"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hermes-wrt-${{ inputs.device }}-${{ inputs.variant }}
          path: out/*
          retention-days: 7
