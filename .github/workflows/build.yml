name: Build Hermes-WRT

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
    inputs:
      source_name:
        description: 'Tipe Source (OpenWrt / ImmortalWrt)'
        required: true
        default: 'openwrt'
        type: choice
        options:
          - openwrt
          - immortalwrt
      source_version:
        description: 'Versi (Pilihan menu)'
        required: true
        default: 'latest'
        type: choice
        options:
          - latest
          - 25.12.5
          - 24.10.0
          - 23.05.5
          - custom (Tulis manual di bawah)
      custom_version:
        description: 'Versi manual (Hanya jika pilih "custom" di atas)'
        required: false
        default: ''
        type: string
      device:
        description: 'Device'
        required: true
        default: 's905x3-x96max'
        type: choice
        options:
          # Amlogic TV Box
          - s905x-b860h
          - s905x-hg680p
          - s905x2-b860hv5-v1
          - s905x2-b860hv5-v2
          - s905x2-b860hv5-v3
          - s905x2-hg680-fj-v1
          - s905x2-hg680-fj-v2
          - s905x2-hg680-fj-v3
          - s905x3-hk1
          - s905x3-x96max
          - s905x3-x96air
          - s905x3-h96max
          - s905x4-advan
          - s905x4-v1
          - s905x4-v2
          - s905x4-v3
          - s905x4-v4
          - s905x4-generic
          - s905w-x96mini
          - s905w-tx3mini
          - s905w-x96w
          - s905lb-q96mini
          - s912-generic
          - s922x-gtking
          # Allwinner & Rockchip TV Box
          - h5-orangepi-zeroplus2
          - h6-orangepi-3
          - h616-orangepi-zero2
          - h618-orangepi-zero3
          - rk3566-orangepi-3b
          - rk3588s-orangepi-5
          - rk3588-orangepi-5plus
          # Official Devices
          - bcm2710-rpi-3b
          - bcm2711-rpi-4b
          - x86-64
      variant:
        description: 'Firmware variant'
        required: true
        default: 'simple'
        type: choice
        options:
          - full
          - simple
          - minimal
      kernel_source:
        description: 'Kernel source (Khusus TV Box; diabaikan pada x86/RPi)'
        required: true
        default: 'ophub'
        type: choice
        options:
          - ophub
          - armarchindo
          - sib0ndt
          - custom
      kernel_version:
        description: 'Kernel version (Khusus TV Box; diabaikan pada x86/RPi)'
        required: true
        default: 'auto'
      disk_size:
        description: 'Total disk image size'
        required: true
        default: '1G'
        type: choice
        options:
          - 512M
          - 1G
          - 2G
          - 4G
          - 8G
      enable_tunnels:
        description: 'Include tunnel packages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_modem:
        description: 'Include modem packages'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      enable_telegram_bot:
        description: 'Enable Telegram Bot Control'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      telegram_bot_token:
        description: 'Telegram Bot Token'
        required: false
        default: ''
        type: string
      telegram_chat_id:
        description: 'Telegram Chat ID'
        required: false
        default: ''
        type: string

env:
  TZ: Asia/Jakarta

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Install Deps
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk \
            git gettext libssl-dev rsync wget unzip tar gzip qemu-utils jq \
            python3 python3-pip aria2 parted dosfstools
          sudo timedatectl set-timezone "$TZ"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ImageBuilder packages
        uses: actions/cache@v4
        with:
          path: imagebuilder/dl
          key: ${{ runner.os }}-ib-dl-${{ inputs.source_name }}-${{ inputs.source_version }}-${{ inputs.device }}
          restore-keys: |
            ${{ runner.os }}-ib-dl-${{ inputs.source_name }}-${{ inputs.source_version }}-
            ${{ runner.os }}-ib-dl-

      - name: Syntax Lint
        run: |
          bash -n imagebuilder.sh
          bash -n scripts/PACKER.sh
          bash -n scripts/INCLUDE.sh

      - name: Inject Config
        run: |
          # ── Auto-mapping target device version ──
          DEVICE="${{ inputs.device }}"
          KERNEL_SRC="${{ inputs.kernel_source }}"
          KERNEL_VER="${{ inputs.kernel_version }}"
          if [[ "$DEVICE" == *"v1" ]]; then
            KERNEL_SRC="armarchindo"
            KERNEL_VER="6.1.66-dbai"
          elif [[ "$DEVICE" == *"v2" ]]; then
            KERNEL_SRC="armarchindo"
            KERNEL_VER="6.4.11"
          elif [[ "$DEVICE" == *"v3" ]]; then
            KERNEL_SRC="armarchindo"
            KERNEL_VER="6.2.2"
          elif [[ "$DEVICE" == *"v4" ]]; then
            KERNEL_SRC="armarchindo"
            KERNEL_VER="5.4.265"
          fi
          
          # Dapatkan strip version dari DEVICE name (s905x2-b860hv5-v1 => s905x2-b860hv5)
          DEVICE_CLEAN=$(echo "$DEVICE" | sed -E 's/-v[1-4]$//')
          
          cat >> hermes.conf << EOF
          KERNEL_SOURCE=${KERNEL_SRC}
          KERNEL_VERSION=${KERNEL_VER}
          BUILD_VARIANT=${{ inputs.variant }}
          DISK_SIZE=${{ inputs.disk_size }}
          ENABLE_TUNNELS=${{ inputs.enable_tunnels }}
          ENABLE_MODEM=${{ inputs.enable_modem }}
          ENABLE_KIDDIN9_FEED=false
          ENABLE_TELEGRAM_BOT=${{ inputs.enable_telegram_bot }}
          TELEGRAM_BOT_TOKEN="${{ inputs.telegram_bot_token }}"
          TELEGRAM_CHAT_ID="${{ inputs.telegram_chat_id }}"
          EOF
          
          echo "DEVICE_NAME=${DEVICE_CLEAN}" >> $GITHUB_ENV

      - name: Build
        id: build
        run: |
          VERSION="${{ inputs.source_version }}"
          if [[ "$VERSION" == "custom (Tulis manual di bawah)" ]]; then
            VERSION="${{ inputs.custom_version }}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "ERROR: Custom version tidak boleh kosong!"
            exit 1
          fi
          chmod +x imagebuilder.sh
          if sudo ./imagebuilder.sh "${{ inputs.source_name }}:${VERSION}" "${DEVICE_NAME:-${{ inputs.device }}}" "${{ inputs.variant }}"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hermes-wrt-${{ inputs.device }}-${{ inputs.variant }}
          path: out/*
          retention-days: 7

      - name: Upload Build Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-logs-${{ inputs.device }}-${{ inputs.variant }}
          path: build_*.log
          retention-days: 3
