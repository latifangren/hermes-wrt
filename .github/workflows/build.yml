name: Build Hermes-WRT

on:
  workflow_dispatch:
    inputs:
      source:
        description: Source (openwrt/immortalwrt:version)
        required: true
        default: openwrt:24.10.0
        type: choice
        options:
          - openwrt:24.10.0
          - openwrt:23.05.5
          - immortalwrt:24.10.0
          - immortalwrt:23.05.4
      device:
        description: Target device
        required: true
        default: all
        type: choice
        options:
          - all
          - s905x
          - s905x2
          - s905x3
          - s905x4
          - s912
          - h5-orangepi-zeroplus2
          - h6-orangepi-3
          - h616-orangepi-zero2
          - h618-orangepi-zero3
          - rk3566-orangepi-3b
          - rk3588s-orangepi-5
          - rk3588-orangepi-5plus
          - bcm2710-rpi-3b
          - bcm2711-rpi-4b
          - x86-64
      variant:
        description: Firmware variant
        required: true
        default: full
        type: choice
        options:
          - full
          - simple
      kernel_source:
        description: Kernel source (TV box only)
        required: true
        default: ophub
        type: choice
        options:
          - ophub
          - armarchindo
          - stable
      kernel_version:
        description: Kernel version (auto = latest stable)
        required: true
        default: auto

env:
  TZ: Asia/Jakarta

jobs:
  prepare:
    runs-on: ubuntu-22.04
    outputs:
      devices: ${{ steps.matrix.outputs.devices }}
    steps:
      - name: Build Matrix
        id: matrix
        run: |
          ALL='{"devices":["s905x","s905x2","s905x3","s905x4","s912","h5-orangepi-zeroplus2","h6-orangepi-3","h616-orangepi-zero2","h618-orangepi-zero3","rk3566-orangepi-3b","rk3588s-orangepi-5","rk3588-orangepi-5plus","bcm2710-rpi-3b","bcm2711-rpi-4b","x86-64"]}'
          if [ "${{ inputs.device }}" = "all" ]; then
            echo "devices=$(echo $ALL | jq -c '.devices')" >> $GITHUB_OUTPUT
          else
            echo "devices=$(jq -nc --arg d '${{ inputs.device }}' '[$d]')" >> $GITHUB_OUTPUT
          fi

  build:
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJSON(needs.prepare.outputs.devices) }}
    runs-on: ubuntu-22.04
    steps:
      - name: Cleanup & Install Deps
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk \
            git gettext libssl-dev rsync wget unzip tar gzip qemu-utils jq \
            python3 python3-pip aria2
          sudo timedatectl set-timezone "$TZ"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Config
        run: |
          cat >> hermes.conf << EOF
          KERNEL_SOURCE=${{ inputs.kernel_source }}
          KERNEL_VERSION=${{ inputs.kernel_version }}
          BUILD_VARIANT=${{ inputs.variant }}
          EOF

      - name: Build
        id: build
        run: |
          chmod +x imagebuilder.sh
          if sudo ./imagebuilder.sh "${{ inputs.source }}" "${{ matrix.device }}" "${{ inputs.variant }}"; then
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: hermes-wrt-${{ matrix.device }}-${{ inputs.variant }}
          path: out/*
          retention-days: 7
